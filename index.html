<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Siege - Batalha de Artilharia 2D</title>
    <meta name="description" content="Um jogo de artilharia por turnos com física dinâmica e destruição.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <!-- Main Menu -->
        <div id="main-menu" class="overlay">
            <div class="content">
                <h1>GRAVITY <span class="accent">SIEGE</span></h1>
                <p>Destrua seus oponentes com precisão e gravidade.</p>

                <div class="settings">
                    <div class="setting-group">
                        <label for="player-count">Jogadores (2-4):</label>
                        <input type="number" id="player-count" min="2" max="4" value="2">
                    </div>
                    <div class="setting-group">
                        <label for="char-count">Personagens por Jogador (1-4):</label>
                        <input type="number" id="char-count" min="1" max="4" value="2">
                    </div>
                </div>

                <button id="start-btn" class="primary-btn">INICIAR BATALHA</button>
            </div>
        </div>

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="player-info">
                <div class="current-player-tag">
                    TURNO: <span id="current-player-name">Jogador 1</span>
                    <div id="player-color-indicator"></div>
                </div>
                <div class="timer">⏱️ <span id="turn-timer">30</span>s</div>
            </div>
            <div class="game-stats">
                <!-- HP bars will be injected here or managed dynamically -->
            </div>
        </div>

        <!-- Canvas -->
        <canvas id="game-canvas"></canvas>

        <!-- Game Over -->
        <div id="game-over" class="overlay hidden">
            <div class="content">
                <h2>VITÓRIA!</h2>
                <h1 id="winner-name">JOGADOR 1</h1>
                <button id="restart-btn" class="primary-btn">JOGAR NOVAMENTE</button>
            </div>
        </div>
    </div>

    <!-- Matter.js Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="game.js"></script>
</body>

</html>
